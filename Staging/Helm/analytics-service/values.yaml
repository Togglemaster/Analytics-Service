analytics-service:
  replicas: 1
  namespace: analytics-service
  image: 778900740186.dkr.ecr.us-east-1.amazonaws.com/analytics-service:staging-6ff5388
  imagePullPolicy: IfNotPresent
  port: 8080
  imagePullSecrets:
    - name: ecr-secret
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  probes:
    enabled: true
    path: /health
    startup:
      failureThreshold: 180
      periodSeconds: 1
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 180
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
  envFrom:
    - secretRef:
        name: analytics-service-credentials
    - secretRef:
        name: analytics-service-config
  ingress:
    path: /analytics-service(/|$)(.*)
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
